<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAM Cabinet VERGEZ - Gestion des Congés</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
/* ── VARIABLES ── */
:root{
  --p:#7b6b8d;--pl:#9d8fb0;--pd:#5a4d6b;
  --s:#5fb3a5;--sl:#7ecec0;--sd:#4a9a8c;
  --a:#d4a853;--al:#e8c27a;--ad:#c49040;
  --danger:#c75a5a;--warn:#d4a853;--ok:#5fb3a5;
  --bg:#f4f5f8;--white:#fff;
  --t1:#2d2d3d;--t2:#4d4d5d;--t3:#7d7d8d;--t4:#adadba;
  --bd:#e4e4ef;--bdl:#eeeeF5;
  --sh1:0 1px 4px rgba(0,0,0,.06);
  --sh2:0 4px 16px rgba(0,0,0,.08);
  --sh3:0 8px 32px rgba(0,0,0,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t2);min-height:100vh}
.app{max-width:1500px;margin:0 auto}

/* TOP BAR */
.topbar{background:var(--pd);padding:.45rem 2rem;display:flex;justify-content:space-between;align-items:center;font-size:.76rem;color:rgba(255,255,255,.65)}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--pd) 0%,var(--p) 55%,var(--pl) 100%);padding:1.75rem 2rem 1.35rem;text-align:center;position:relative;overflow:hidden}
.hdr::before{content:"";position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='40' cy='40' r='30' fill='none' stroke='%23ffffff' stroke-width='0.5' opacity='0.06'/%3E%3C/svg%3E");background-size:80px 80px}
.hdr h1{font-family:'Montserrat',sans-serif;font-size:1.45rem;font-weight:800;color:#fff;letter-spacing:2.5px;text-transform:uppercase;position:relative;text-shadow:0 2px 10px rgba(0,0,0,.25)}
.hdr p{font-size:.78rem;color:rgba(255,255,255,.72);letter-spacing:2.5px;text-transform:uppercase;position:relative;margin-top:.3rem}

/* NAV */
.nav{background:var(--white);padding:0 1.5rem;display:flex;align-items:center;gap:.1rem;border-bottom:2px solid var(--bd);box-shadow:var(--sh1);flex-wrap:wrap}
.ntab{padding:.9rem 1.2rem;color:var(--t3);font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .2s;position:relative}
.ntab:hover{color:var(--p);background:rgba(123,107,141,.04)}
.ntab.on{color:var(--p);border-bottom-color:var(--p)}
.nadm{margin-left:auto;background:var(--p);color:#fff;border-radius:6px;padding:.55rem 1rem;border:none;margin-bottom:0;border-bottom:none;font-size:.78rem;font-weight:700;cursor:pointer;transition:background .2s}
.nadm:hover{background:var(--pd)}
.nadm.out{background:var(--a)}
.nbadge{position:absolute;top:8px;right:8px;background:var(--danger);color:#fff;font-size:.58rem;font-weight:800;padding:.1rem .35rem;border-radius:10px;animation:pulseB 2s infinite}
@keyframes pulseB{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

/* CONTENT */
.wrap{padding:1.5rem 2rem}

/* BANNERS */
.tbanner{background:rgba(95,179,165,.1);border:1px solid rgba(95,179,165,.3);border-left:4px solid var(--s);border-radius:8px;padding:.7rem 1.25rem;margin-bottom:1.25rem;font-size:.83rem;color:var(--sd);font-weight:500;display:flex;align-items:center;gap:.5rem}

.drbanner{border-radius:10px;padding:1rem 1.5rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:1rem}
.drbanner.pr{background:rgba(95,179,165,.08);border:1px solid rgba(95,179,165,.3)}
.drbanner.ab{background:rgba(199,90,90,.08);border:1px solid rgba(199,90,90,.3)}
.dricon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.dricon.pr{background:rgba(95,179,165,.18)}
.dricon.ab{background:rgba(199,90,90,.18)}
.drbanner h3{font-family:'Montserrat',sans-serif;font-size:.92rem;font-weight:700}
.drbanner h3.pr{color:var(--sd)}
.drbanner h3.ab{color:var(--danger)}
.drbanner p{font-size:.78rem;color:var(--t3);margin-top:.15rem}

.datebanner{background:linear-gradient(135deg,var(--p) 0%,var(--pl) 100%);color:#fff;padding:1rem 1.5rem;border-radius:12px;margin-bottom:1.25rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;box-shadow:0 4px 20px rgba(123,107,141,.3)}
.datebanner h2{font-family:'Montserrat',sans-serif;font-size:1.05rem;font-weight:700;text-transform:capitalize}
.dstats{display:flex;gap:1.25rem}
.dstat{text-align:center;background:rgba(255,255,255,.15);border-radius:8px;padding:.4rem .875rem}
.dstat .dl{font-size:.63rem;opacity:.8;text-transform:uppercase;letter-spacing:.5px}
.dstat .dv{font-size:1.25rem;font-weight:800;font-family:'Montserrat',sans-serif}

/* TODAY ABS */
.todayabs{background:var(--white);border-radius:12px;padding:1.25rem 1.5rem;border:1px solid var(--bd);margin-bottom:1.5rem;box-shadow:var(--sh1)}
.sectitle{font-family:'Montserrat',sans-serif;font-size:.85rem;font-weight:700;color:var(--p);margin-bottom:.875rem;display:flex;align-items:center;gap:.5rem;text-transform:uppercase;letter-spacing:.8px}
.sbadge{background:var(--s);color:#fff;font-size:.6rem;padding:.15rem .5rem;border-radius:20px;font-weight:600}
.ablist{display:flex;flex-wrap:wrap;gap:.6rem}
.abchip{display:flex;align-items:center;gap:.45rem;padding:.42rem .875rem;border-radius:20px;font-size:.81rem;font-weight:500}
.abchip.conge{background:rgba(95,179,165,.1);border:1px solid rgba(95,179,165,.3)}
.abchip.ss{background:rgba(212,168,83,.1);border:1px solid rgba(212,168,83,.3)}
.abchip.maladie{background:rgba(199,90,90,.1);border:1px solid rgba(199,90,90,.3)}
.abchip.formation{background:rgba(123,107,141,.1);border:1px solid rgba(123,107,141,.3)}
.chav{width:22px;height:22px;border-radius:50%;background:var(--s);display:flex;align-items:center;justify-content:center;font-size:.53rem;font-weight:800;color:#fff}
.chtag{font-size:.67rem;padding:.1rem .42rem;border-radius:4px;font-weight:700;color:#fff}
.chtag.conge{background:var(--s)}
.chtag.ss{background:var(--a)}
.chtag.maladie{background:var(--danger)}
.chtag.formation{background:var(--p)}
.noabs{color:var(--ok);font-weight:600;display:flex;align-items:center;gap:.5rem;font-size:.86rem}

/* LAYOUT */
.mlayout{display:grid;grid-template-columns:1fr 275px;gap:1.5rem}
.mlayout.team{grid-template-columns:1fr}
@media(max-width:1100px){.mlayout{grid-template-columns:1fr}}

/* MONTH TABS */
.mtabs{display:flex;gap:.3rem;margin-bottom:1rem;flex-wrap:wrap}
.mtab{padding:.35rem .7rem;background:var(--white);border:1px solid var(--bd);border-radius:6px;color:var(--t3);cursor:pointer;font-size:.73rem;font-weight:600;transition:all .15s}
.mtab:hover{border-color:var(--s);color:var(--s);background:rgba(95,179,165,.04)}
.mtab.on{background:var(--s);border-color:var(--s);color:#fff;box-shadow:0 2px 8px rgba(95,179,165,.3)}

/* CALENDAR */
.calwrap{background:var(--white);border-radius:12px;border:1px solid var(--bd);overflow-x:auto;box-shadow:var(--sh1)}
.calhdr{display:grid;grid-template-columns:158px repeat(31,minmax(27px,1fr));background:linear-gradient(135deg,var(--pd) 0%,var(--p) 100%);color:#fff;font-size:.6rem;font-weight:700;min-width:1050px;position:sticky;top:0;z-index:10}
.calhdr>div{padding:.5rem .08rem;text-align:center;border-right:1px solid rgba(255,255,255,.08)}
.calhdr>div:first-child{text-align:left;padding-left:.875rem;border-right:1px solid rgba(255,255,255,.15);font-size:.72rem}
.dhd{display:flex;flex-direction:column;align-items:center;gap:1px}
.dnum{font-size:.68rem;font-weight:800}
.dltr{font-size:.56rem;opacity:.65;font-weight:500}
.wkhd{background:rgba(0,0,0,.18)}
.thd{background:rgba(212,168,83,.45)!important}

.calrow{display:grid;grid-template-columns:158px repeat(31,minmax(27px,1fr));border-bottom:1px solid var(--bdl);min-width:1050px;transition:background .15s}
.calrow:hover{background:rgba(123,107,141,.025)}
.calrow:last-child{border-bottom:none}
.calemp{padding:.38rem .5rem;display:flex;align-items:center;gap:.4rem;border-right:1px solid var(--bd);font-size:.7rem;font-weight:600;color:var(--t1)}
.ename{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mav{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--s),var(--sl));display:flex;align-items:center;justify-content:center;font-size:.52rem;font-weight:800;color:#fff;flex-shrink:0}
.mav.dr{background:linear-gradient(135deg,var(--p),var(--pl))}

.ccell{padding:.22rem .08rem;text-align:center;border-right:1px solid var(--bdl);display:flex;align-items:center;justify-content:center;min-height:31px}
.ccell.we{background:rgba(0,0,0,.022)}
.ccell.td{background:rgba(212,168,83,.06);border-right:1px solid rgba(212,168,83,.22)}
.ccell.off{background:rgba(0,0,0,.014)}

/* ABSENCE BADGES */
.abg{display:inline-flex;align-items:center;justify-content:center;width:21px;height:21px;border-radius:5px;font-size:.58rem;font-weight:800;color:#fff}
.abg.conge{background:linear-gradient(135deg,var(--s),var(--sd));box-shadow:0 1px 4px rgba(95,179,165,.5)}
.abg.ss{background:linear-gradient(135deg,var(--a),var(--ad));box-shadow:0 1px 4px rgba(212,168,83,.5)}
.abg.maladie{background:linear-gradient(135deg,var(--danger),#a84a4a);box-shadow:0 1px 4px rgba(199,90,90,.5)}
.abg.formation{background:linear-gradient(135deg,var(--p),var(--pd));box-shadow:0 1px 4px rgba(123,107,141,.5)}
.abg.pend{background:repeating-linear-gradient(45deg,rgba(212,168,83,.25),rgba(212,168,83,.25) 2px,transparent 2px,transparent 5px);border:1.5px dashed var(--warn);color:var(--warn);box-shadow:none;font-weight:900}

/* SOLDES */
.solwrap{background:var(--white);border-radius:12px;border:1px solid var(--bd);overflow:hidden;margin-top:1.5rem;box-shadow:var(--sh1)}
.solhdr{display:grid;grid-template-columns:2.3fr 1fr 1fr 1fr 1.3fr;padding:.7rem 1.25rem;background:linear-gradient(135deg,var(--s),var(--sd));color:#fff;font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:.4px}
.solrow{display:grid;grid-template-columns:2.3fr 1fr 1fr 1fr 1.3fr;padding:.7rem 1.25rem;border-bottom:1px solid var(--bdl);align-items:center;transition:background .15s}
.solrow:hover{background:rgba(95,179,165,.04)}
.solrow:last-child{border-bottom:none}
.empinfo{font-weight:600;display:flex;align-items:center;gap:.55rem;color:var(--t1);font-size:.83rem}
.empav{width:29px;height:29px;border-radius:50%;background:linear-gradient(135deg,var(--s),var(--sl));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.67rem;color:#fff;flex-shrink:0}
.cval{font-family:'Montserrat',sans-serif;font-size:.86rem;font-weight:700;color:var(--t2)}
.schip{display:inline-flex;align-items:center;gap:.28rem;padding:.22rem .55rem;border-radius:20px;font-size:.76rem;font-weight:700;font-family:'Montserrat',sans-serif}
.schip.ok{background:rgba(95,179,165,.12);color:var(--sd);border:1px solid rgba(95,179,165,.25)}
.schip.wa{background:rgba(212,168,83,.12);color:#9a7a2a;border:1px solid rgba(212,168,83,.25)}
.schip.ba{background:rgba(199,90,90,.12);color:var(--danger);border:1px solid rgba(199,90,90,.25)}
.solupd{font-size:.7rem;color:var(--t4);margin-top:.4rem;text-align:right;padding-right:1.25rem;padding-bottom:.4rem}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:1rem}
.scard{background:var(--white);border-radius:10px;padding:1.1rem 1.2rem;border:1px solid var(--bd);box-shadow:var(--sh1)}
.scard h3{font-family:'Montserrat',sans-serif;font-size:.74rem;font-weight:700;color:var(--p);margin-bottom:.7rem;text-transform:uppercase;letter-spacing:.4px}
.lgrid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem}
.litem{display:flex;align-items:center;gap:.45rem;font-size:.77rem;color:var(--t3)}
.ldot{width:20px;height:13px;border-radius:4px;flex-shrink:0}
.ldot.conge{background:linear-gradient(135deg,var(--s),var(--sd))}
.ldot.ss{background:linear-gradient(135deg,var(--a),var(--ad))}
.ldot.maladie{background:linear-gradient(135deg,var(--danger),#a84a4a)}
.ldot.formation{background:linear-gradient(135deg,var(--p),var(--pd))}
.lpend{margin-top:.55rem;padding:.38rem .6rem;background:repeating-linear-gradient(45deg,rgba(212,168,83,.12),rgba(212,168,83,.12) 2px,transparent 2px,transparent 5px);border:1px dashed var(--warn);border-radius:5px;font-size:.7rem;color:#9a7a2a;text-align:center;font-weight:600}
.rlist{list-style:none}
.rlist li{padding:.45rem 0;border-bottom:1px solid var(--bdl);font-size:.77rem;color:var(--t3);display:flex;align-items:flex-start;gap:.45rem;line-height:1.4}
.rlist li:last-child{border-bottom:none}
.rico{width:17px;height:17px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.58rem;margin-top:1px}
.rico.inf{background:rgba(95,179,165,.2);color:var(--sd)}
.rico.war{background:rgba(212,168,83,.2);color:var(--a)}
.drpill{padding:.48rem .75rem;border-radius:6px;display:flex;align-items:center;gap:.5rem;font-size:.8rem;font-weight:600;margin-top:.25rem}
.drpill.pr{background:rgba(95,179,165,.1);border:1px solid rgba(95,179,165,.28);color:var(--sd)}
.drpill.ab{background:rgba(199,90,90,.1);border:1px solid rgba(199,90,90,.28);color:var(--danger)}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sdot.pr{background:var(--ok);box-shadow:0 0 0 3px rgba(95,179,165,.22)}
.sdot.ab{background:var(--danger);box-shadow:0 0 0 3px rgba(199,90,90,.22)}

/* ADMIN */
.adminsec{background:var(--white);border-radius:12px;padding:1.5rem;border:1px solid var(--bd);margin-bottom:1.5rem;box-shadow:var(--sh1)}
.adminsec h2{font-family:'Montserrat',sans-serif;font-size:1.05rem;font-weight:700;color:var(--p);margin-bottom:1.25rem}
.agrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:1rem}
.acard{background:var(--bg);border-radius:10px;padding:1.2rem;border:1px solid var(--bd);display:flex;flex-direction:column;gap:.5rem}
.acard h4{font-size:.86rem;font-weight:700;color:var(--t1)}
.acard p{font-size:.77rem;color:var(--t3);flex:1}
.ibtn{width:100%;padding:.72rem;border:none;border-radius:8px;color:#fff;font-weight:700;font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.45rem;transition:all .2s;font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,var(--s),var(--sd))}
.ibtn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(95,179,165,.35)}
.ibtn.pri{background:linear-gradient(135deg,var(--p),var(--pd))}
.ibtn.pri:hover{box-shadow:0 6px 20px rgba(123,107,141,.35)}
.ibtn.acc{background:linear-gradient(135deg,var(--a),var(--ad))}
.ibtn.acc:hover{box-shadow:0 6px 20px rgba(212,168,83,.35)}
.ibtn.dan{background:linear-gradient(135deg,var(--danger),#a84a4a)}
.ibtn.dan:hover{box-shadow:0 6px 20px rgba(199,90,90,.35)}
.fi{display:none}
.imsg{margin-top:.45rem;padding:.45rem .7rem;border-radius:6px;font-size:.74rem;font-weight:600}
.imsg.ok{background:rgba(95,179,165,.1);color:var(--sd);border:1px solid rgba(95,179,165,.22)}
.imsg.er{background:rgba(199,90,90,.1);color:var(--danger);border:1px solid rgba(199,90,90,.22)}

/* REQUESTS */
.reqsec{background:var(--white);border-radius:12px;border:1px solid var(--bd);padding:1.5rem;box-shadow:var(--sh1)}
.rfilt{display:flex;gap:.38rem;margin-bottom:1.5rem;flex-wrap:wrap}
.rfbtn{padding:.42rem .875rem;border-radius:20px;border:1px solid var(--bd);background:var(--white);cursor:pointer;font-size:.77rem;font-weight:600;transition:all .2s;color:var(--t3);font-family:'DM Sans',sans-serif}
.rfbtn:hover{border-color:var(--p);color:var(--p)}
.rfbtn.on{background:var(--p);color:#fff;border-color:var(--p);box-shadow:0 2px 8px rgba(123,107,141,.3)}
.rfbtn .cnt{background:rgba(0,0,0,.1);padding:.07rem .33rem;border-radius:10px;margin-left:.28rem;font-size:.68rem}
.rfbtn.on .cnt{background:rgba(255,255,255,.25)}
.rcard{background:var(--bg);border-radius:10px;padding:1.1rem 1.2rem;margin-bottom:.875rem;border:1px solid var(--bd);border-left:4px solid var(--warn);transition:box-shadow .15s}
.rcard:hover{box-shadow:var(--sh2)}
.rcard.validated{border-left-color:var(--ok);background:rgba(95,179,165,.04)}
.rcard.refused{border-left-color:var(--danger);background:rgba(199,90,90,.04)}
.rchdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.7rem;gap:1rem}
.rcemp{font-weight:700;color:var(--t1);display:flex;align-items:center;gap:.45rem;font-size:.88rem}
.rcst{font-size:.7rem;padding:.2rem .55rem;border-radius:12px;font-weight:700;white-space:nowrap}
.rcst.pending{background:rgba(212,168,83,.15);color:#9a7a2a;border:1px solid rgba(212,168,83,.28)}
.rcst.validated{background:rgba(95,179,165,.15);color:var(--sd);border:1px solid rgba(95,179,165,.28)}
.rcst.refused{background:rgba(199,90,90,.15);color:var(--danger);border:1px solid rgba(199,90,90,.28)}
.rcdet{font-size:.8rem;color:var(--t3);margin-bottom:.7rem;display:flex;flex-wrap:wrap;gap:.35rem 1.4rem}
.rccmt{background:var(--white);padding:.6rem .85rem;border-radius:6px;font-size:.8rem;color:var(--t2);margin-bottom:.7rem;border:1px solid var(--bd)}
.rccmt .lb{font-size:.68rem;font-weight:700;color:var(--t3);display:block;margin-bottom:.18rem;text-transform:uppercase;letter-spacing:.4px}
.rcact{display:flex;gap:.45rem;margin-top:.5rem}
.rcact button{padding:.42rem .85rem;border-radius:6px;border:none;font-weight:700;font-size:.77rem;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.rcact .bv{background:var(--ok);color:#fff}
.rcact .bv:hover{background:var(--sd)}
.rcact .br{background:var(--danger);color:#fff}
.rcact .br:hover{background:#a84a4a}
.rcresp{margin-top:.7rem;padding-top:.7rem;border-top:1px solid var(--bd);font-size:.8rem}
.rcresp .lb{font-size:.68rem;font-weight:700;color:var(--t3);display:block;margin-bottom:.22rem;text-transform:uppercase}
.noreq{text-align:center;color:var(--t4);padding:3rem 2rem;font-size:.88rem}

/* MODAL */
.movl{position:fixed;inset:0;background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(3px)}
.modal{background:var(--white);border-radius:16px;padding:2rem;width:90%;max-width:470px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.22)}
.modal h2{font-family:'Montserrat',sans-serif;font-size:1.1rem;color:var(--p);margin-bottom:.35rem;font-weight:700}
.msub{color:var(--t3);font-size:.83rem;margin-bottom:1.4rem}
.fg{margin-bottom:.95rem}
.fg label{display:block;font-size:.8rem;font-weight:700;color:var(--t2);margin-bottom:.32rem}
.modal input,.modal select,.modal textarea{width:100%;padding:.72rem .85rem;border:1.5px solid var(--bd);border-radius:8px;font-size:.88rem;font-family:'DM Sans',sans-serif;color:var(--t1);transition:border-color .15s;outline:none;background:var(--white)}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(123,107,141,.1)}
.modal textarea{resize:vertical;min-height:76px}
.mbtns{display:flex;gap:.7rem;margin-top:.5rem}
.mbtns button{flex:1;padding:.78rem;border-radius:8px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.86rem;transition:all .15s}
.bcnc{background:var(--bg);border:1.5px solid var(--bd);color:var(--t3)}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

const ADMIN_PW = "vergez2026";
const YEAR = 2026;
const MONTHS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const MSHORT = ["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
const DLTR   = ["D","L","M","M","J","V","S"];

const ABS = {
  C:  { label:"Congé payé",  cls:"conge",    s:"C" },
  SS: { label:"Sans solde",  cls:"ss",       s:"SS" },
  M:  { label:"Maladie",     cls:"maladie",  s:"M" },
  F:  { label:"Formation",   cls:"formation",s:"F" },
};

const INIT_EMP = [
  { id:1,  name:"Dr François VERGEZ",  isDoc:true,  cpN1:0,    cpN:35,    rcc:0 },
  { id:2,  name:"Mathilde TSANG-TUNG", isDoc:false, cpN1:0,    cpN:0,     rcc:0 },
  { id:3,  name:"Chloé TANGUY",        isDoc:false, cpN1:0,    cpN:0,     rcc:0 },
  { id:4,  name:"Erika CAPDEBOSCQ",    isDoc:false, cpN1:0,    cpN:8,     rcc:3.51 },
  { id:5,  name:"Virginie BLARD",      isDoc:false, cpN1:8.5,  cpN:36,    rcc:0 },
  { id:6,  name:"Laurence GIGAN",      isDoc:false, cpN1:13.5, cpN:25.5,  rcc:0.34 },
  { id:7,  name:"Cécile GRONDIN",      isDoc:false, cpN1:0,    cpN:3.5,   rcc:0 },
  { id:8,  name:"Fabiola TECHER",      isDoc:false, cpN1:0,    cpN:17.5,  rcc:0 },
  { id:9,  name:"Sylvie De la Hogue",  isDoc:false, cpN1:0,    cpN:12.18, rcc:0 },
  { id:10, name:"Elodie Ludovic",      isDoc:false, cpN1:0,    cpN:15.5,  rcc:0 },
  { id:11, name:"Stéphanie MARTIN",    isDoc:false, cpN1:0,    cpN:9.5,   rcc:0 },
];

function initials(n){
  const p = n.replace(/^Dr\s+/i,"").split(/[\s\-]+/).filter(x=>x.length>1);
  if(!p.length) return "?";
  if(p.length===1) return p[0].slice(0,2).toUpperCase();
  return (p[0][0]+p[p.length-1][0]).toUpperCase();
}

function norm(s){ return (s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toUpperCase().replace(/[^A-Z]/g," ").replace(/\s+/g," ").trim(); }

function matchEmp(excelName, emps){
  const n = norm(excelName);
  const parts = n.split(" ").filter(p=>p.length>2);
  let best=null, score=0;
  for(const e of emps){
    const en = norm(e.name);
    let s=0;
    for(const p of parts) if(en.includes(p)) s++;
    if(s>score){ score=s; best=e; }
  }
  return score>=1 ? best : null;
}

function lsGet(k,def){
  try{ const v=localStorage.getItem(k); return v?JSON.parse(v):def; }catch{ return def; }
}

/* ─── LOGIN MODAL ─── */
function LoginModal({onLogin, onClose}){
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const sub = e=>{
    e.preventDefault();
    if(pw===ADMIN_PW) onLogin();
    else setErr("Mot de passe incorrect");
  };
  return (
    <div className="movl" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h2>🔐 Accès Administration</h2>
        <p className="msub">Entrez le mot de passe de la direction pour accéder à la gestion complète</p>
        <form onSubmit={sub}>
          {err && <div className="errmsg">{err}</div>}
          <div className="fg"><label>Mot de passe</label>
            <input type="password" placeholder="••••••••" value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} autoFocus />
          </div>
          <div className="mbtns">
            <button type="button" className="bcnc" onClick={onClose}>Annuler</button>
            <button type="submit" className="bsub">Se connecter</button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ─── REQUEST MODAL ─── */
function ReqModal({emps, onSub, onClose}){
  const [eid,setEid]=useState("");
  const [tp,setTp]=useState("C");
  const [sd,setSd]=useState("");
  const [ed,setEd]=useState("");
  const [cmt,setCmt]=useState("");
  const sub = e=>{
    e.preventDefault();
    if(!eid||!sd||!ed){alert("Champs obligatoires manquants");return;}
    if(new Date(ed)<new Date(sd)){alert("Date de fin avant date de début");return;}
    onSub({id:Date.now(),employeeId:parseInt(eid),type:tp,startDate:sd,endDate:ed,comment:cmt,status:"pending",createdAt:new Date().toISOString()});
  };
  return (
    <div className="movl" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h2>📝 Nouvelle demande de congé</h2>
        <p className="msub">Remplissez les informations ci-dessous</p>
        <form onSubmit={sub}>
          <div className="fg"><label>Employé *</label>
            <select value={eid} onChange={e=>setEid(e.target.value)} required>
              <option value="">-- Sélectionner un employé --</option>
              {emps.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
            </select>
          </div>
          <div className="fg"><label>Type d'absence *</label>
            <select value={tp} onChange={e=>setTp(e.target.value)}>
              <option value="C">Congé payé</option>
              <option value="SS">Sans solde</option>
              <option value="M">Maladie</option>
              <option value="F">Formation</option>
            </select>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".75rem"}}>
            <div className="fg"><label>Date de début *</label>
              <input type="date" value={sd} onChange={e=>setSd(e.target.value)} required/>
            </div>
            <div className="fg"><label>Date de fin *</label>
              <input type="date" value={ed} onChange={e=>setEd(e.target.value)} required/>
            </div>
          </div>
          <div className="fg"><label>Motif / Commentaire</label>
            <textarea value={cmt} onChange={e=>setCmt(e.target.value)} placeholder="Ex: Vacances, RDV médical, congé parental…"/>
          </div>
          <div className="mbtns">
            <button type="button" className="bcnc" onClick={onClose}>Annuler</button>
            <button type="submit" className="bsub">Soumettre la demande</button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ─── RESPONSE MODAL ─── */
function RespModal({req, emps, onSub, onClose}){
  const [resp,setResp]=useState("");
  const [act,setAct]=useState(null);
  const emp=emps.find(e=>e.id===req.employeeId);
  return (
    <div className="movl" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h2>📋 Traiter la demande</h2>
        <div style={{background:"var(--bg)",padding:".875rem",borderRadius:"8px",marginBottom:"1rem",border:"1px solid var(--bd)"}}>
          <div style={{fontWeight:700,color:"var(--t1)",marginBottom:".22rem"}}>{emp?.name}</div>
          <div style={{fontSize:".8rem",color:"var(--t3)"}}>{ABS[req.type]?.label} · du {new Date(req.startDate).toLocaleDateString("fr-FR")} au {new Date(req.endDate).toLocaleDateString("fr-FR")}</div>
          {req.comment&&<div style={{fontSize:".78rem",fontStyle:"italic",marginTop:".35rem",color:"var(--t2)"}}>"{req.comment}"</div>}
        </div>
        <div className="fg"><label>Réponse de la direction <span style={{fontWeight:400,color:"var(--t4)"}}>(optionnel)</span></label>
          <textarea value={resp} onChange={e=>setResp(e.target.value)} placeholder="Ajouter un commentaire à la décision…"/>
        </div>
        <div style={{display:"flex",gap:".5rem"}}>
          <button style={{flex:1,padding:".72rem",borderRadius:"8px",border:"1.5px solid var(--bd)",background:"var(--bg)",fontWeight:700,cursor:"pointer",fontFamily:"DM Sans,sans-serif",color:"var(--t3)"}} onClick={onClose}>Annuler</button>
          <button style={{flex:1,padding:".72rem",borderRadius:"8px",border:"none",background:act==="refuse"?"linear-gradient(135deg,var(--danger),#a84a4a)":"rgba(199,90,90,.15)",color:act==="refuse"?"#fff":"var(--danger)",fontWeight:700,cursor:"pointer",fontFamily:"DM Sans,sans-serif",transition:"all .2s"}} onClick={()=>setAct("refuse")}>❌ Refuser</button>
          <button style={{flex:1,padding:".72rem",borderRadius:"8px",border:"none",background:act==="validate"?"linear-gradient(135deg,var(--ok),var(--sd))":"rgba(95,179,165,.15)",color:act==="validate"?"#fff":"var(--sd)",fontWeight:700,cursor:"pointer",fontFamily:"DM Sans,sans-serif",transition:"all .2s"}} onClick={()=>setAct("validate")}>✅ Valider</button>
        </div>
        {act&&(
          <button style={{marginTop:".875rem",width:"100%",padding:".85rem",borderRadius:"8px",border:"none",fontWeight:700,fontSize:".88rem",cursor:"pointer",fontFamily:"DM Sans,sans-serif",color:"#fff",background:act==="validate"?"linear-gradient(135deg,var(--ok),var(--sd))":"linear-gradient(135deg,var(--danger),#a84a4a)",boxShadow:act==="validate"?"0 4px 16px rgba(95,179,165,.4)":"0 4px 16px rgba(199,90,90,.4)"}} onClick={()=>onSub(req.id,act,resp)}>
            Confirmer : {act==="validate"?"Valider la demande ✅":"Refuser la demande ❌"}
          </button>
        )}
      </div>
    </div>
  );
}

/* ─── APP ─── */
function App(){
  const [emps,  setEmps]  = useState(()=>lsGet("vz_emps_26",INIT_EMP));
  const [abs,   setAbs]   = useState(()=>lsGet("vz_abs_26",{}));
  const [reqs,  setReqs]  = useState(()=>lsGet("vz_reqs_26",[]));
  const [month, setMonth] = useState(new Date().getMonth());
  const [loading, setLoading] = useState(false);
  const [admin,  setAdmin]  = useState(()=>sessionStorage.getItem("vz_admin")==="true");
  const [showLogin,  setShowLogin]  = useState(false);
  const [showReqM,   setShowReqM]   = useState(false);
  const [showRespM,  setShowRespM]  = useState(null);
  const [tab,    setTab]    = useState("planning");
  const [rfilt,  setRfilt]  = useState("all");
  const [solDate,setSolDate]= useState(()=>localStorage.getItem("vz_sol_date")||null);
  const [plDate, setPlDate] = useState(()=>localStorage.getItem("vz_pl_date")||null);
  const [imsg,   setImsg]   = useState({pl:null,sol:null});

  const today = new Date();

  useEffect(()=>{ localStorage.setItem("vz_abs_26",  JSON.stringify(abs));  },[abs]);
  useEffect(()=>{ localStorage.setItem("vz_emps_26", JSON.stringify(emps)); },[emps]);
  useEffect(()=>{ localStorage.setItem("vz_reqs_26", JSON.stringify(reqs)); },[reqs]);

  const pendingN = useMemo(()=>reqs.filter(r=>r.status==="pending").length,[reqs]);

  const cpris = useCallback((eid)=>{
    const ea=abs[eid]||{};
    let n=0;
    Object.values(ea).forEach(md=>Object.values(md).forEach(t=>{if(t==="C")n++;}));
    return n;
  },[abs]);

  const solde = useCallback((emp)=>(emp.cpN1||0)+(emp.cpN||0)+(emp.rcc||0)-cpris(emp.id),[cpris]);

  const todayAbs = useMemo(()=>{
    const m=today.getMonth(),d=today.getDate();
    return emps.filter(e=>abs[e.id]?.[m]?.[d]).map(e=>({...e,at:abs[e.id][m][d]}));
  },[abs,emps]);

  const drPresent = !abs[1]?.[today.getMonth()]?.[today.getDate()];

  const inRange=(m,d,s,e)=>{
    const dt=new Date(YEAR,m,d);
    return dt>=new Date(s)&&dt<=new Date(e);
  };
  const getPend=(eid,m,d)=>reqs.find(r=>r.employeeId===eid&&r.status==="pending"&&inRange(m,d,r.startDate,r.endDate));

  /* ── Import Planning ── */
  const importPlanning = async (e)=>{
    const f=e.target.files[0]; if(!f) return;
    setLoading(true);
    try{
      const buf=await f.arrayBuffer();
      const wb=XLSX.read(buf,{type:"array"});
      const newAbs={...abs};
      let entries=0,months=0;

      for(let mi=0;mi<12;mi++){
        const sn=MONTHS[mi];
        const sheet=wb.Sheets[sn]||wb.Sheets[wb.SheetNames.find(n=>norm(n)===norm(sn))];
        if(!sheet) continue;

        const rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:null});
        if(!rows||rows.length<9) continue;

        const hrow=rows[7];
        if(!hrow) continue;

        const dayMap={};
        for(let c=2;c<hrow.length;c++){
          const v=hrow[c];
          if(v!==null&&v!==undefined){
            const day=parseInt(v);
            if(!isNaN(day)&&day>=1&&day<=31) dayMap[c]=day;
          }
        }

        let found=false;
        for(let ri=8;ri<=18&&ri<rows.length;ri++){
          const row=rows[ri];
          if(!row||!row[1]) continue;
          const xn=row[1].toString().trim();
          if(!xn||xn.toLowerCase().includes("total")) continue;

          const emp=matchEmp(xn,emps);
          if(!emp) continue;

          if(!newAbs[emp.id]) newAbs[emp.id]={};
          if(!newAbs[emp.id][mi]) newAbs[emp.id][mi]={};

          for(const [cs,day] of Object.entries(dayMap)){
            const val=row[parseInt(cs)];
            if(val&&typeof val==="string"&&val.trim()){
              const code=val.trim().toUpperCase();
              if(["C","SS","M","F"].includes(code)){
                newAbs[emp.id][mi][day]=code;
                entries++;
              }
            }
          }
          found=true;
        }
        if(found) months++;
      }
      setAbs(newAbs);
      const dt=new Date().toLocaleDateString("fr-FR");
      setPlDate(dt); localStorage.setItem("vz_pl_date",dt);
      setImsg(prev=>({...prev,pl:{ok:true,txt:`✅ ${months} mois importés · ${entries} absences chargées`}}));
    }catch(err){
      console.error(err);
      setImsg(prev=>({...prev,pl:{ok:false,txt:"❌ Erreur lors de l'import du planning"}}));
    }
    setLoading(false); e.target.value="";
  };

  /* ── Import Soldes ── */
  const importSoldes = async (e)=>{
    const f=e.target.files[0]; if(!f) return;
    setLoading(true);
    try{
      const buf=await f.arrayBuffer();
      const wb=XLSX.read(buf,{type:"array"});
      const sheet=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:null});

      let hi=-1;
      for(let i=0;i<rows.length;i++){
        if(rows[i]&&rows[i][0]!=null&&rows[i][0].toString().trim()==="Matricule"){hi=i;break;}
      }
      if(hi===-1){setImsg(prev=>({...prev,sol:{ok:false,txt:"❌ En-tête 'Matricule' introuvable"}}));setLoading(false);e.target.value="";return;}

      const hdrs=rows[hi];
      let cN1=-1,cN=-1,cRcc=-1;
      for(let c=0;c<hdrs.length;c++){
        const h=((hdrs[c]||"")+"").toLowerCase().replace(/\s+/g," ").replace(/\n/g," ");
        if(h.includes("solde")&&h.includes("n-1")) cN1=c;
        else if(h.includes("solde")&&(h.includes("cp n")||h.includes("rcc")===false)&&!h.includes("n-1")&&h.includes("cp")) cN=c;
        else if(h.includes("solde")&&h.includes("rcc")) cRcc=c;
      }
      if(cN1===-1) cN1=5;
      if(cN===-1)  cN=9;
      if(cRcc===-1) cRcc=15;

      const upd=[...emps];
      let matched=0;
      for(let ri=hi+1;ri<rows.length;ri++){
        const row=rows[ri];
        if(!row||!row[1]) continue;
        const fn=row[1].toString().trim();
        if(!fn||fn.toLowerCase().includes("total")) continue;
        const emp=matchEmp(fn,upd);
        if(!emp) continue;
        const idx=upd.findIndex(x=>x.id===emp.id);
        if(idx!==-1){
          upd[idx]={...upd[idx],cpN1:parseFloat(row[cN1])||0,cpN:parseFloat(row[cN])||0,rcc:parseFloat(row[cRcc])||0};
          matched++;
        }
      }
      setEmps(upd);
      const dt=new Date().toLocaleDateString("fr-FR");
      setSolDate(dt); localStorage.setItem("vz_sol_date",dt);
      setImsg(prev=>({...prev,sol:{ok:true,txt:`✅ ${matched} employés mis à jour`}}));
    }catch(err){
      console.error(err);
      setImsg(prev=>({...prev,sol:{ok:false,txt:"❌ Erreur lors de l'import des soldes"}}));
    }
    setLoading(false); e.target.value="";
  };

  const addReq = r=>{setReqs(prev=>[...prev,r]);setShowReqM(false);};

  const handleResp = (rid,act,resp)=>{
    const req=reqs.find(r=>r.id===rid);
    const updated=reqs.map(r=>r.id!==rid?r:{...r,status:act==="validate"?"validated":"refused",response:resp,respondedAt:new Date().toISOString()});
    if(act==="validate"&&req){
      const na={...abs};
      const s=new Date(req.startDate),en=new Date(req.endDate);
      for(const d=new Date(s);d<=en;d.setDate(d.getDate()+1)){
        const dow=d.getDay(); if(dow===0||dow===6) continue;
        const m=d.getMonth(),day=d.getDate();
        if(!na[req.employeeId]) na[req.employeeId]={};
        if(!na[req.employeeId][m]) na[req.employeeId][m]={};
        na[req.employeeId][m][day]=req.type;
      }
      setAbs(na);
    }
    setReqs(updated);
    setShowRespM(null);
  };

  const dim=new Date(YEAR,month+1,0).getDate();
  const filtReqs=useMemo(()=>rfilt==="all"?reqs:reqs.filter(r=>r.status===rfilt),[reqs,rfilt]);

  const renderCell=(emp,day)=>{
    const dt=new Date(YEAR,month,day);
    const dow=dt.getDay();
    const isWe=dow===0||dow===6;
    const isToday=today.getFullYear()===YEAR&&today.getMonth()===month&&today.getDate()===day;
    const isOff=dt>new Date(YEAR,11,31);
    const at=abs[emp.id]?.[month]?.[day];
    const pend=admin&&!at&&getPend(emp.id,month,day);

    let cls="ccell";
    if(isWe) cls+=" we";
    if(isToday) cls+=" td";
    if(isOff) cls+=" off";

    let badge=null;
    if(at){
      badge=<span className={"abg "+(ABS[at]?.cls||"")}>{at}</span>;
    } else if(pend){
      badge=<span className="abg pend" title="En attente de validation">?</span>;
    }
    return <div key={day} className={cls}>{badge}</div>;
  };

  return (
    <div className="app">
      {showLogin && <LoginModal onLogin={()=>{setAdmin(true);sessionStorage.setItem("vz_admin","true");setShowLogin(false);}} onClose={()=>setShowLogin(false)}/>}
      {showReqM  && <ReqModal emps={emps.filter(e=>!e.isDoc)} onSub={addReq} onClose={()=>setShowReqM(false)}/>}
      {showRespM && <RespModal req={showRespM} emps={emps} onSub={handleResp} onClose={()=>setShowRespM(null)}/>}

      <div className="topbar">
        <span>📍 38 route de Savanna, 97460 Saint-Paul – La Réunion</span>
        <span>📞 +262 262 22 55 50</span>
      </div>

      <div className="hdr">
        <h1>Cabinet d'Orthodontie Dr François VERGEZ</h1>
        <p>Planning des Congés · Équipe 2026</p>
      </div>

      <nav className="nav">
        <button className={"ntab"+(tab==="planning"?" on":"")} onClick={()=>setTab("planning")}>📅 Planning</button>
        {admin&&<>
          <button className={"ntab"+(tab==="requests"?" on":"")} onClick={()=>setTab("requests")}>
            📋 Demandes
            {pendingN>0&&<span className="nbadge">{pendingN}</span>}
          </button>
          <button className={"ntab"+(tab==="admin"?" on":"")} onClick={()=>setTab("admin")}>⚙️ Administration</button>
        </>}
        {admin
          ? <button className="nadm out" onClick={()=>{setAdmin(false);sessionStorage.removeItem("vz_admin");setTab("planning");}}>🔓 Déconnexion</button>
          : <button className="nadm" onClick={()=>setShowLogin(true)}>🔐 Admin</button>
        }
      </nav>

      <div className="wrap">

        {tab==="planning"&&<>
          {!admin&&<div className="tbanner">ℹ️ Mode Équipe · Vue mensuelle du planning en lecture seule</div>}

          <div className={"drbanner "+(drPresent?"pr":"ab")}>
            <div className={"dricon "+(drPresent?"pr":"ab")}>{drPresent?"🩺":"🏖️"}</div>
            <div>
              <h3 className={drPresent?"pr":"ab"}>Dr VERGEZ – {drPresent?"Présent au cabinet aujourd'hui":"Absent du cabinet aujourd'hui"}</h3>
              <p>{drPresent?"Le cabinet est ouvert · Consultations normales":"Cabinet fermé ou consultations réduites"}</p>
            </div>
          </div>

          <div className="datebanner">
            <h2>📆 {today.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</h2>
            <div className="dstats">
              <div className="dstat"><div className="dl">Absents</div><div className="dv">{todayAbs.length}</div></div>
              <div className="dstat"><div className="dl">Présents</div><div className="dv">{emps.length-todayAbs.length}</div></div>
            </div>
          </div>

          <div className="todayabs">
            <h3 className="sectitle">👥 Absents aujourd'hui <span className="sbadge">{todayAbs.length}</span></h3>
            {todayAbs.length>0
              ? <div className="ablist">
                  {todayAbs.map(emp=>{const t=ABS[emp.at]; return(
                    <div key={emp.id} className={"abchip "+(t?.cls||"")}>
                      <div className="chav">{initials(emp.name)}</div>
                      <span>{emp.name}</span>
                      <span className={"chtag "+(t?.cls||"")}>{t?.label}</span>
                    </div>
                  );})}
                </div>
              : <div className="noabs">✅ Toute l'équipe est présente aujourd'hui !</div>
            }
          </div>

          <div className={"mlayout"+(admin?"":" team")}>
            <div>
              <h3 className="sectitle">📅 Calendrier mensuel <span className="sbadge">{YEAR}</span></h3>
              <div className="mtabs">
                {MONTHS.map((m,i)=><button key={m} className={"mtab"+(month===i?" on":"")} onClick={()=>setMonth(i)}>{MSHORT[i]}</button>)}
              </div>

              <div className="calwrap">
                <div className="calhdr">
                  <div>Employé · {MONTHS[month]}</div>
                  {Array.from({length:dim},(_,i)=>{
                    const d=new Date(YEAR,month,i+1);
                    const dow=d.getDay();
                    const isWe=dow===0||dow===6;
                    const isTd=today.getMonth()===month&&today.getDate()===i+1;
                    return(
                      <div key={i+1} className={"dhd"+(isWe?" wkhd":"")+(isTd?" thd":"")}>
                        <span className="dnum">{i+1}</span>
                        <span className="dltr">{DLTR[dow]}</span>
                      </div>
                    );
                  })}
                </div>
                {emps.map(emp=>(
                  <div key={emp.id} className="calrow">
                    <div className="calemp">
                      <div className={"mav"+(emp.isDoc?" dr":"")}>{initials(emp.name)}</div>
                      <span className="ename">
                        {emp.isDoc?"Dr "+emp.name.replace(/^Dr\s+/i,"").split(" ").slice(-1)[0]:emp.name.split(" ")[0]}
                      </span>
                    </div>
                    {Array.from({length:dim},(_,i)=>renderCell(emp,i+1))}
                  </div>
                ))}
              </div>

              {admin&&<>
                <h3 className="sectitle" style={{marginTop:"1.75rem"}}>📊 Soldes des Congés</h3>
                <div className="solwrap">
                  <div className="solhdr">
                    <div>Employé</div><div>CP N-1</div><div>CP N</div><div>RCC</div><div>Solde restant</div>
                  </div>
                  {emps.filter(e=>!e.isDoc).map(emp=>{
                    const sr=solde(emp);
                    const cls=sr>10?"ok":sr>5?"wa":"ba";
                    return(
                      <div key={emp.id} className="solrow">
                        <div className="empinfo"><div className="empav">{initials(emp.name)}</div>{emp.name}</div>
                        <div className="cval">{(emp.cpN1||0).toFixed(1)} j</div>
                        <div className="cval">{(emp.cpN||0).toFixed(1)} j</div>
                        <div className="cval">{(emp.rcc||0).toFixed(1)} j</div>
                        <div><span className={"schip "+cls}>{cls==="ok"?"✅":cls==="wa"?"⚠️":"🔴"} {sr.toFixed(1)} j</span></div>
                      </div>
                    );
                  })}
                </div>
                {solDate&&<div className="solupd">Soldes mis à jour le {solDate}</div>}
              </>}
            </div>

            {admin&&(
              <div className="sidebar">
                <div className="scard">
                  <h3>🎨 Légende</h3>
                  <div className="lgrid">
                    <div className="litem"><div className="ldot conge"></div><span>C · Congé</span></div>
                    <div className="litem"><div className="ldot ss"></div><span>SS · Sans solde</span></div>
                    <div className="litem"><div className="ldot maladie"></div><span>M · Maladie</span></div>
                    <div className="litem"><div className="ldot formation"></div><span>F · Formation</span></div>
                  </div>
                  <div className="lpend">⌛ ? = En attente de validation</div>
                </div>

                <div className="scard">
                  <h3>📋 Règles cabinet</h3>
                  <ul className="rlist">
                    <li><div className="rico war">⚠</div><span>Congés uniquement lorsque <strong>Dr VERGEZ est absent</strong></span></li>
                    <li><div className="rico inf">i</div><span>3 semaines consécutives : <strong>1 fois/an</strong> maximum</span></li>
                    <li><div className="rico inf">i</div><span>Vert &gt;10j · Orange &gt;5j · Rouge ≤5j</span></li>
                  </ul>
                </div>

                <div className="scard">
                  <h3>👨‍⚕️ Dr VERGEZ · Aujourd'hui</h3>
                  <div className={"drpill "+(drPresent?"pr":"ab")}>
                    <div className={"sdot "+(drPresent?"pr":"ab")}></div>
                    {drPresent?"Présent au cabinet":"Absent · Cabinet fermé"}
                  </div>
                </div>

                {(plDate||solDate)&&(
                  <div className="scard">
                    <h3>📁 Derniers imports</h3>
                    {plDate&&<div style={{fontSize:".76rem",color:"var(--t3)",marginBottom:".2rem"}}>Planning : {plDate}</div>}
                    {solDate&&<div style={{fontSize:".76rem",color:"var(--t3)"}}>Soldes : {solDate}</div>}
                  </div>
                )}
              </div>
            )}
          </div>
        </>}

        {tab==="requests"&&admin&&(
          <div className="reqsec">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.5rem",flexWrap:"wrap",gap:"1rem"}}>
              <h3 className="sectitle" style={{margin:0}}>📋 Demandes de congés</h3>
              <button className="ibtn pri" style={{width:"auto"}} onClick={()=>setShowReqM(true)}>➕ Nouvelle demande</button>
            </div>
            <div className="rfilt">
              {[["all","Toutes"],["pending","En attente"],["validated","Validées"],["refused","Refusées"]].map(([k,l])=>(
                <button key={k} className={"rfbtn"+(rfilt===k?" on":"")} onClick={()=>setRfilt(k)}>
                  {l}<span className="cnt">{k==="all"?reqs.length:reqs.filter(r=>r.status===k).length}</span>
                </button>
              ))}
            </div>
            {filtReqs.length===0
              ? <div className="noreq">Aucune demande {rfilt!=="all"?"dans cette catégorie":""}</div>
              : [...filtReqs].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(req=>{
                  const emp=emps.find(e=>e.id===req.employeeId);
                  const t=ABS[req.type];
                  return(
                    <div key={req.id} className={"rcard "+req.status}>
                      <div className="rchdr">
                        <div className="rcemp">
                          <div className="empav" style={{width:26,height:26,fontSize:".62rem"}}>{initials(emp?.name||"?")}</div>
                          {emp?.name||"Employé inconnu"}
                        </div>
                        <span className={"rcst "+req.status}>
                          {req.status==="pending"?"⏳ En attente":req.status==="validated"?"✅ Validée":"❌ Refusée"}
                        </span>
                      </div>
                      <div className="rcdet">
                        <span><strong>Type :</strong> {t?.label}</span>
                        <span><strong>Période :</strong> {new Date(req.startDate).toLocaleDateString("fr-FR")} → {new Date(req.endDate).toLocaleDateString("fr-FR")}</span>
                        <span><strong>Soumis le :</strong> {new Date(req.createdAt).toLocaleDateString("fr-FR")}</span>
                      </div>
                      {req.comment&&(
                        <div className="rccmt"><span className="lb">Motif</span>{req.comment}</div>
                      )}
                      {req.status==="pending"&&(
                        <div className="rcact">
                          <button className="bv" onClick={()=>setShowRespM(req)}>✅ Valider</button>
                          <button className="br" onClick={()=>setShowRespM(req)}>❌ Refuser</button>
                        </div>
                      )}
                      {req.response&&(
                        <div className="rcresp"><span className="lb">Réponse direction</span>{req.response}</div>
                      )}
                    </div>
                  );
                })
            }
          </div>
        )}

        {tab==="admin"&&admin&&(
          <div className="adminsec">
            <h2>⚙️ Administration</h2>
            <div className="agrid">
              <div className="acard">
                <h4>📅 Importer le planning</h4>
                <p>Fichier "Calendrier_d_absences_2026.xlsx" – 12 feuilles (Janvier…Décembre), ligne 8 = en-tête, lignes 9–19 = employés</p>
                <input type="file" accept=".xlsx,.xls" onChange={importPlanning} className="fi" id="fi-pl"/>
                <label htmlFor="fi-pl" className="ibtn acc">{loading?"⏳ Import…":"📁 Importer le planning Excel"}</label>
                {imsg.pl&&<div className={"imsg "+(imsg.pl.ok?"ok":"er")}>{imsg.pl.txt}</div>}
              </div>

              <div className="acard">
                <h4>📊 Importer les soldes</h4>
                <p>Fichier "Solde_Repos_…xlsx" – ligne 2 = en-tête "Matricule", colonnes auto-détectées (CP N-1, CP N, RCC)</p>
                <input type="file" accept=".xlsx,.xls" onChange={importSoldes} className="fi" id="fi-sol"/>
                <label htmlFor="fi-sol" className="ibtn">{loading?"⏳ Import…":"📁 Importer soldes Excel"}</label>
                {imsg.sol&&<div className={"imsg "+(imsg.sol.ok?"ok":"er")}>{imsg.sol.txt}</div>}
              </div>

              <div className="acard">
                <h4>➕ Saisir une demande</h4>
                <p>Créer manuellement une demande de congé ou d'absence pour un membre de l'équipe</p>
                <button className="ibtn pri" onClick={()=>setShowReqM(true)}>📝 Nouvelle demande</button>
              </div>

              <div className="acard">
                <h4>🗑️ Réinitialiser congés</h4>
                <p>Supprimer toutes les absences importées du planning (les demandes ne sont pas touchées)</p>
                <button className="ibtn dan" onClick={()=>{if(window.confirm("Supprimer toutes les absences du planning ?")){ setAbs({});localStorage.removeItem("vz_abs_26");setPlDate(null);localStorage.removeItem("vz_pl_date");setImsg(p=>({...p,pl:null})); }}}>🗑️ Supprimer les congés</button>
              </div>

              <div className="acard">
                <h4>🗑️ Réinitialiser demandes</h4>
                <p>Supprimer toutes les demandes de congés enregistrées dans le système</p>
                <button className="ibtn dan" onClick={()=>{if(window.confirm("Supprimer toutes les demandes ?")){ setReqs([]);localStorage.removeItem("vz_reqs_26"); }}}>🗑️ Supprimer les demandes</button>
              </div>

              <div className="acard">
                <h4>🔄 Réinitialiser les soldes</h4>
                <p>Remettre les soldes de congés aux valeurs par défaut (avant import)</p>
                <button className="ibtn dan" onClick={()=>{if(window.confirm("Réinitialiser les soldes aux valeurs par défaut ?")){ setEmps(INIT_EMP);localStorage.removeItem("vz_emps_26");setSolDate(null);localStorage.removeItem("vz_sol_date");setImsg(p=>({...p,sol:null})); }}}>🔄 Réinitialiser les soldes</button>
              </div>
            </div>

            <div style={{marginTop:"1.5rem",background:"rgba(95,179,165,.06)",border:"1px solid rgba(95,179,165,.22)",borderRadius:"10px",padding:"1rem 1.25rem",fontSize:".78rem",color:"var(--t3)"}}>
              <strong style={{color:"var(--sd)"}}>ℹ️ Structure attendue des fichiers</strong>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:".75rem",marginTop:".65rem"}}>
                <div><strong>Calendrier (planning) :</strong><br/>· 12 feuilles : Janvier … Décembre<br/>· Ligne 8 : en-têtes (col B = nom, col C+ = jours 1–31)<br/>· Lignes 9–19 : absences (codes C / SS / M / F)</div>
                <div><strong>Solde des repos :</strong><br/>· Ligne 1 : titre du fichier paie<br/>· Ligne 2 : en-tête avec "Matricule" en col A<br/>· Colonnes détectées automatiquement : Solde CP N-1, Solde CP N, Solde RCC</div>
              </div>
            </div>
          </div>
        )}

      </div>
      <div className="footer">© 2026 Cabinet d'Orthodontie Dr François VERGEZ · Saint-Paul, La Réunion · Application Gestion des Congés</div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
