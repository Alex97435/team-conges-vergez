                        <p>Entrez le mot de passe pour accéder à la gestion</p>
                        <form onSubmit={handleSubmit}>
                            {error && <div className="error-msg">{error}</div>}
                            <input 
                                type="password" 
                                placeholder="Mot de passe" 
                                value={password}
                                onChange={(e) => { setPassword(e.target.value); setError(""); }}
                                autoFocus
                            />
                            <div className="modal-buttons">
                                <button type="button" className="btn-cancel" onClick={onClose}>Annuler</button>
                                <button type="submit" className="btn-submit">Connexion</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function RequestModal({ employees, onSubmit, onClose }) {
            const [employeeId, setEmployeeId] = useState("");
            const [type, setType] = useState("C");
            const [startDate, setStartDate] = useState("");
            const [endDate, setEndDate] = useState("");
            const [comment, setComment] = useState("");
            
            const handleSubmit = (e) => {
                e.preventDefault();
                if (!employeeId || !startDate || !endDate) {
                    alert("Veuillez remplir tous les champs obligatoires");
                    return;
                }
                onSubmit({
                    id: Date.now(),
                    employeeId: parseInt(employeeId),
                    type,
                    startDate,
                    endDate,
                    comment,
                    status: "pending",
                    createdAt: new Date().toISOString()
                });
            };
            
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <h2>📝 Nouvelle demande de congé</h2>
                        <form onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label>Employé *</label>
                                <select value={employeeId} onChange={(e) => setEmployeeId(e.target.value)} required>
                                    <option value="">-- Sélectionner --</option>
                                    {employees.filter(e => !e.isDoctor).map(emp => (
                                        <option key={emp.id} value={emp.id}>{emp.name}</option>
                                    ))}
                                </select>
                            </div>
                            <div className="form-group">
                                <label>Type d'absence *</label>
                                <select value={type} onChange={(e) => setType(e.target.value)}>
                                    <option value="C">Congé payé</option>
                                    <option value="SS">Sans solde</option>
                                    <option value="M">Maladie</option>
                                    <option value="F">Formation</option>
                                </select>
                            </div>
                            <div className="form-group">
                                <label>Date de début *</label>
                                <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} required />
                            </div>
                            <div className="form-group">
                                <label>Date de fin *</label>
                                <input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} required />
                            </div>
                            <div className="form-group">
                                <label>Motif / Commentaire</label>
                                <textarea 
                                    value={comment} 
                                    onChange={(e) => setComment(e.target.value)}
                                    placeholder="Ex: Vacances familiales, RDV médical, etc."
                                />
                            </div>
                            <div className="modal-buttons">
                                <button type="button" className="btn-cancel" onClick={onClose}>Annuler</button>
                                <button type="submit" className="btn-submit">Soumettre la demande</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function ResponseModal({ request, employees, onSubmit, onClose }) {
            const [response, setResponse] = useState("");
            const [action, setAction] = useState("");
            
            const emp = employees.find(e => e.id === request.employeeId);
            
            const handleSubmit = () => {
                if (!action) return;
                onSubmit(request.id, action, response);
            };
            
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <h2>{action === "validate" ? "✅ Valider" : action === "refuse" ? "❌ Refuser" : "📋 "} la demande</h2>
                        <div style={{ background: "var(--bg-light)", padding: "1rem", borderRadius: "8px", marginBottom: "1rem" }}>
                            <p style={{ textAlign: "left", margin: 0 }}>
                                <strong>{emp?.name}</strong><br />
                                {ABSENCE_TYPES[request.type]?.label} du {new Date(request.startDate).toLocaleDateString("fr-FR")} au {new Date(request.endDate).toLocaleDateString("fr-FR")}
                                {request.comment && <><br /><em>Motif : {request.comment}</em></>}
                            </p>
                        </div>
                        <div className="form-group">
                            <label>Réponse de la direction (optionnel)</label>
                            <textarea 
                                value={response} 
                                onChange={(e) => setResponse(e.target.value)}
                                placeholder="Ajouter un commentaire..."
                            />
                        </div>
                        <div className="modal-buttons">
                            <button type="button" className="btn-cancel" onClick={onClose}>Annuler</button>
                            <button type="button" className="btn-danger" onClick={() => { setAction("refuse"); }}>❌ Refuser</button>
                            <button type="button" className="btn-success" onClick={() => { setAction("validate"); }}>✅ Valider</button>
                        </div>
                        {action && (
                            <div style={{ marginTop: "1rem", textAlign: "center" }}>
                                <button 
                                    className="import-btn" 
                                    style={{ background: action === "validate" ? "var(--success)" : "var(--danger)" }}
                                    onClick={handleSubmit}
                                >
                                    Confirmer : {action === "validate" ? "Valider" : "Refuser"}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function getInitials(name) {
            return name.split(" ").filter(n => n.length > 2).map(n => n[0]).join("").slice(0, 2);
        }

        function App() {
            const [employees, setEmployees] = useState(INITIAL_EMPLOYEES);
            const [absences, setAbsences] = useState({});
            const [requests, setRequests] = useState([]);
            const [selectedMonth, setSelectedMonth] = useState(new Date().getMonth());
            const [loading, setLoading] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [showRequestModal, setShowRequestModal] = useState(false);
            const [showResponseModal, setShowResponseModal] = useState(null);
            const [activeTab, setActiveTab] = useState("planning");
            const [requestFilter, setRequestFilter] = useState("all");
            const [soldesUpdateDate, setSoldesUpdateDate] = useState("28/02/2026");

            const today = new Date();
            const selectedYear = 2026;

            useEffect(() => {
                const savedAbsences = localStorage.getItem("vergez_absences_2026");
                if (savedAbsences) setAbsences(JSON.parse(savedAbsences));
                
                const savedEmployees = localStorage.getItem("vergez_employees_2026");
                if (savedEmployees) setEmployees(JSON.parse(savedEmployees));
                
                const savedRequests = localStorage.getItem("vergez_requests_2026");
                if (savedRequests) setRequests(JSON.parse(savedRequests));
                
                const savedSoldesDate = localStorage.getItem("vergez_soldes_date");
                if (savedSoldesDate) setSoldesUpdateDate(savedSoldesDate);
                
                if (sessionStorage.getItem("vergez_admin") === "true") setIsAdmin(true);
            }, []);

            useEffect(() => {
                localStorage.setItem("vergez_absences_2026", JSON.stringify(absences));
            }, [absences]);

            useEffect(() => {
                localStorage.setItem("vergez_employees_2026", JSON.stringify(employees));
            }, [employees]);

            useEffect(() => {
                localStorage.setItem("vergez_requests_2026", JSON.stringify(requests));
            }, [requests]);

            const pendingCount = useMemo(() => requests.filter(r => r.status === "pending").length, [requests]);

            const calculateCongesPris = useCallback((empId) => {
                const empAbs = absences[empId] || {};
                let conges = 0;
                Object.values(empAbs).forEach(monthData => {
                    Object.values(monthData).forEach(type => {
                        if (type === "C") conges++;
                    });
                });
                return conges;
            }, [absences]);

            const calculateSoldeRestant = useCallback((emp) => {
                const congesPris = calculateCongesPris(emp.id);
                const totalDisponible = (emp.cpN1 || 0) + (emp.cpN || 0) + (emp.rcc || 0);
                return totalDisponible - congesPris;
            }, [calculateCongesPris]);

            const todayAbsences = useMemo(() => {
                const m = today.getMonth();
                const d = today.getDate();
                return employees.filter(emp => absences[emp.id]?.[m]?.[d])
                    .map(emp => ({ ...emp, type: absences[emp.id][m][d] }));
            }, [absences, employees]);

            const isDoctorPresentToday = !absences[1]?.[today.getMonth()]?.[today.getDate()];

            // Check if a date has a pending request
            const getPendingForDate = (empId, month, day) => {
                return requests.find(r => 
                    r.employeeId === empId && 
                    r.status === "pending" &&
                    isDateInRange(selectedYear, month, day, r.startDate, r.endDate)
                );
            };

            const isDateInRange = (year, month, day, startStr, endStr) => {
                const date = new Date(year, month, day);
                const start = new Date(startStr);
                const end = new Date(endStr);
                return date >= start && date <= end;
            };

            const handleSoldesFileImport = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                try {
                    const data = await file.arrayBuffer();
                    const wb = XLSX.read(data, { type: "array" });
                    const sheet = wb.Sheets[wb.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                    
                    let headerRow = -1;
                    for (let i = 0; i < json.length; i++) {
                        if (json[i] && json[i][0] === "Matricule") {
                            headerRow = i;
                            break;
                        }
                    }
                    
                    if (headerRow === -1) {
                        alert("Format de fichier non reconnu");
                        setLoading(false);
                        return;
                    }
                    
                    const headers = json[headerRow];
                    const colCpN1 = headers.findIndex(h => h && h.toString().includes("Solde") && h.toString().includes("N-1"));
                    const colCpN = headers.findIndex(h => h && h.toString().includes("Solde") && h.toString().includes("CP N") && !h.toString().includes("N-1"));
                    const colRcc = headers.findIndex(h => h && h.toString().includes("Solde") && h.toString().includes("RCC"));
                    
                    const updatedEmployees = [...employees];
                    
                    for (let i = headerRow + 1; i < json.length; i++) {
                        const row = json[i];
                        if (!row || !row[1] || row[1] === "Total général") continue;
                        
                        const fullName = row[1].toString();
                        const nameParts = fullName.split(" née ")[0].trim().split(" ");
                        const lastName = nameParts[0].toUpperCase();
                        
                        const empIndex = updatedEmployees.findIndex(e => 
                            e.name.toUpperCase().includes(lastName)
                        );
                        
                        if (empIndex !== -1) {
                            updatedEmployees[empIndex] = {
                                ...updatedEmployees[empIndex],
                                cpN1: parseFloat(row[colCpN1]) || 0,
                                cpN: parseFloat(row[colCpN]) || 0,
                                rcc: parseFloat(row[colRcc]) || 0
                            };
                        }
                    }
                    
                    setEmployees(updatedEmployees);
                    const dateStr = new Date().toLocaleDateString("fr-FR");
                    setSoldesUpdateDate(dateStr);
                    localStorage.setItem("vergez_soldes_date", dateStr);
                    alert("Import des soldes réussi !");
                } catch (err) {
                    console.error(err);
                    alert("Erreur lors de l'import des soldes");
                }
                setLoading(false);
                e.target.value = "";
            };

            const handleNewRequest = (request) => {
                setRequests([...requests, request]);
                setShowRequestModal(false);
                alert("Demande enregistrée !");
            };

            const handleRequestResponse = (requestId, action, response) => {
                const updatedRequests = requests.map(r => {
                    if (r.id === requestId) {
                        return {
                            ...r,
                            status: action === "validate" ? "validated" : "refused",
                            response,
                            respondedAt: new Date().toISOString()
                        };
                    }
                    return r;
                });
                
                // If validated, update absences
                if (action === "validate") {
                    const request = requests.find(r => r.id === requestId);
                    if (request) {
                        const newAbsences = { ...absences };
                        const start = new Date(request.startDate);
                        const end = new Date(request.endDate);
                        
                        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                            const month = d.getMonth();
                            const day = d.getDate();
                            const dayOfWeek = d.getDay();
                            
                            // Skip weekends
                            if (dayOfWeek === 0 || dayOfWeek === 6) continue;
                            
                            if (!newAbsences[request.employeeId]) newAbsences[request.employeeId] = {};
                            if (!newAbsences[request.employeeId][month]) newAbsences[request.employeeId][month] = {};
                            newAbsences[request.employeeId][month][day] = request.type;
                        }
                        
                        setAbsences(newAbsences);
                    }
                }
                
                setRequests(updatedRequests);
                setShowResponseModal(null);
            };

            const clearData = () => {
                if (window.confirm("Supprimer toutes les données de congés ?")) {
                    setAbsences({});
                    localStorage.removeItem("vergez_absences_2026");
                }
            };

            const clearRequests = () => {
                if (window.confirm("Supprimer toutes les demandes ?")) {
                    setRequests([]);
                    localStorage.removeItem("vergez_requests_2026");
                }
            };

            const daysInMonth = new Date(selectedYear, selectedMonth + 1, 0).getDate();

            const filteredRequests = useMemo(() => {
                if (requestFilter === "all") return requests;
                return requests.filter(r => r.status === requestFilter);
            }, [requests, requestFilter]);

            return (
                <div className="app-container">
                    {showLoginModal && <LoginModal onLogin={() => { setIsAdmin(true); sessionStorage.setItem("vergez_admin", "true"); setShowLoginModal(false); }} onClose={() => setShowLoginModal(false)} />}
                    {showRequestModal && <RequestModal employees={employees} onSubmit={handleNewRequest} onClose={() => setShowRequestModal(false)} />}
                    {showResponseModal && <ResponseModal request={showResponseModal} employees={employees} onSubmit={handleRequestResponse} onClose={() => setShowResponseModal(null)} />}
                    
                    <div className="top-bar">
                        <span>📍 38 route de Savanna, 97460 Saint Paul - La Réunion</span>
                        <span>📞 +262 262 22 55 50</span>
                    </div>
                    
                    <div className="header-main">
                        <h1>Cabinet d'Orthodontie Dr François Vergez</h1>
                        <p>Planning des Congés - Équipe</p>
                    </div>
                    
                    <nav className="nav-bar">
                        <button className={"nav-item" + (activeTab === "planning" ? " active" : "")} onClick={() => setActiveTab("planning")}>
                            📅 Planning
                        </button>
                        {isAdmin && (
                            <>
                                <button className={"nav-item" + (activeTab === "requests" ? " active" : "")} onClick={() => setActiveTab("requests")}>
                                    📋 Demandes
                                    {pendingCount > 0 && <span className="nav-badge">{pendingCount}</span>}
                                </button>
                                <button className={"nav-item" + (activeTab === "admin" ? " active" : "")} onClick={() => setActiveTab("admin")}>
                                    ⚙️ Administration
                                </button>
                            </>
                        )}
                        {isAdmin ? (
                            <button className="nav-item admin-btn logged" onClick={() => { setIsAdmin(false); sessionStorage.removeItem("vergez_admin"); setActiveTab("planning"); }}>
                                🔓 Déconnexion Admin
                            </button>
                        ) : (
                            <button className="nav-item admin-btn" onClick={() => setShowLoginModal(true)}>
                                🔐 Admin
                            </button>
                        )}
                    </nav>
                    
                    <div className="content-wrapper">
                        {activeTab === "planning" && (
                            <>
                                {!isAdmin && (
                                    <div className="team-info-banner">
                                        ℹ️ Mode Équipe : Vue mensuelle des congés uniquement
                                    </div>
                                )}
                                
                                <div className={"alert-box" + (isDoctorPresentToday ? "" : " info")}>
                                    <div className="alert-icon">{isDoctorPresentToday ? "⚠" : "ℹ"}</div>
                                    <div className="alert-content">
                                        <h3>{isDoctorPresentToday ? "Dr VERGEZ Présent" : "Dr VERGEZ Absent"}</h3>
                                        <p>{isDoctorPresentToday ? "Le Dr VERGEZ est présent aujourd'hui." : "Le Dr VERGEZ est absent."}</p>
                                    </div>
                                </div>
                                
                                <div className="date-banner">
                                    <h2>📆 {today.toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}</h2>
                                    <div className="date-info">
                                        <div className="date-item">
                                            <div className="label">Absents</div>
                                            <div className="value">{todayAbsences.length}</div>
                                        </div>
                                        <div className="date-item">
                                            <div className="label">Présents</div>
                                            <div className="value">{employees.length - todayAbsences.length}</div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="today-absences">
                                    <h3 className="section-title">👤 Qui est absent aujourd'hui ?</h3>
                                    {todayAbsences.length > 0 ? (
                                        <div className="absent-list">
                                            {todayAbsences.map(emp => (
                                                <div key={emp.id} className={"absent-chip " + ABSENCE_TYPES[emp.type]?.cls}>
                                                    <div className="chip-avatar">{getInitials(emp.name)}</div>
                                                    <span>{emp.name}</span>
                                                    <span className={"chip-type " + ABSENCE_TYPES[emp.type]?.cls}>{ABSENCE_TYPES[emp.type]?.label}</span>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="no-absences">✅ Toute l'équipe est présente aujourd'hui !</div>
                                    )}
                                </div>
                                
                                <div className={"main-layout" + (isAdmin ? "" : " team-mode")}>
                                    <div className="main-section">
                                        <h3 className="section-title">
                                            📅 Vue mensuelle <span className="section-badge">{selectedYear}</span>
                                        </h3>
                                        <div className="month-tabs">
                                            {MONTHS.map((m, i) => (
                                                <button key={m} className={"month-tab" + (selectedMonth === i ? " active" : "")} onClick={() => setSelectedMonth(i)}>
                                                    {m.slice(0, 3)}
                                                </button>
                                            ))}
                                        </div>
                                        
                                        <div className="calendar-full">
                                            <div className="calendar-full-header">
                                                <div>Employé</div>
                                                {Array.from({ length: daysInMonth }, (_, i) => {
                                                    const d = new Date(selectedYear, selectedMonth, i + 1);
                                                    return <div key={i + 1}>{i + 1}<br /><small>{DAYS[d.getDay()].slice(0, 1)}</small></div>;
                                                })}
                                            </div>
                                            {employees.map(emp => (
                                                <div key={emp.id} className="calendar-full-row">
                                                    <div>
                                                        <div className={"mini-avatar" + (emp.isDoctor ? " doctor" : "")} style={{ width: 20, height: 20, fontSize: "0.55rem" }}>{getInitials(emp.name)}</div>
                                                        <span>{emp.name.split(" ")[0]}</span>
                                                    </div>
                                                    {Array.from({ length: daysInMonth }, (_, i) => {
                                                        const day = i + 1;
                                                        const date = new Date(selectedYear, selectedMonth, day);
                                                        const isWe = date.getDay() === 0 || date.getDay() === 6;
                                                        const at = absences[emp.id]?.[selectedMonth]?.[day];
                                                        const pending = isAdmin && getPendingForDate(emp.id, selectedMonth, day);
                                                        
                                                        let cls = "";
                                                        let content = "";
                                                        
                                                        if (at) {
                                                            cls = ABSENCE_TYPES[at]?.cls || "";
                                                            content = at;
                                                        } else if (pending) {
                                                            cls = "pending";
                                                            content = "?";
                                                        } else if (isWe) {
                                                            cls = "weekend";
                                                        }
                                                        
                                                        return <div key={day} className={"full-cell " + cls}>{content}</div>;
                                                    })}
                                                </div>
                                            ))}
                                        </div>
                                        
                                        {isAdmin && (
                                            <>
                                                <h3 className="section-title" style={{ marginTop: "1.5rem" }}>📊 Soldes des Congés</h3>
                                                <div className="soldes-table">
                                                    <div className="soldes-table-header">
                                                        <div>Employé</div>
                                                        <div>CP N-1</div>
                                                        <div>CP N</div>
                                                        <div>RCC</div>
                                                        <div>Solde restant</div>
                                                    </div>
                                                    {employees.filter(e => !e.isDoctor).map(emp => {
                                                        const soldeRestant = calculateSoldeRestant(emp);
                                                        return (
                                                            <div key={emp.id} className="soldes-table-row">
                                                                <div className="employee-name">
                                                                    <div className="employee-avatar">{getInitials(emp.name)}</div>
                                                                    <span>{emp.name}</span>
                                                                </div>
                                                                <div className="cell-value">{(emp.cpN1 || 0).toFixed(1)}</div>
                                                                <div className="cell-value">{(emp.cpN || 0).toFixed(1)}</div>
                                                                <div className="cell-value">{(emp.rcc || 0).toFixed(1)}</div>
                                                                <div className={"cell-value " + (soldeRestant > 10 ? "positive" : soldeRestant > 5 ? "warning" : "negative")}>
                                                                    {soldeRestant.toFixed(1)} j
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                                <div className="soldes-update">Soldes mis à jour le {soldesUpdateDate}</div>
                                            </>
                                        )}
                                    </div>
                                    
                                    {isAdmin && (
                                        <div className="sidebar">
                                            <div className="sidebar-card">
                                                <h3>🎨 Légende</h3>
                                                <div className="legend-grid">
                                                    <div className="legend-item"><div className="legend-color conge"></div><span>C - Congé</span></div>
                                                    <div className="legend-item"><div className="legend-color ss"></div><span>SS - Sans solde</span></div>
                                                    <div className="legend-item"><div className="legend-color maladie"></div><span>M - Maladie</span></div>
                                                    <div className="legend-item"><div className="legend-color formation"></div><span>F - Formation</span></div>
                                                </div>
                                                <div style={{ marginTop: "0.75rem", padding: "0.5rem", background: "repeating-linear-gradient(45deg, rgba(212,168,83,0.2), rgba(212,168,83,0.2) 2px, transparent 2px, transparent 4px)", borderRadius: "4px", fontSize: "0.75rem", color: "var(--warning)", textAlign: "center" }}>
                                                    ? = En attente de validation
                                                </div>
                                            </div>
                                            
                                            <div className="sidebar-card">
                                                <h3>📋 Règles</h3>
                                                <ul className="rules-list">
                                                    <li><div className="rule-icon warning">⚠</div><span>Pas de congé si <strong>Dr VERGEZ présent</strong></span></li>
                                                    <li><div className="rule-icon info">i</div><span>Si 3 semaines consécutives acceptées, valable <strong>1 seule fois/an</strong></span></li>
                                                </ul>
                                            </div>
                                            
                                            <div className="sidebar-card">
                                                <h3>👨‍⚕️ Dr VERGEZ</h3>
                                                <div className={"doctor-status " + (isDoctorPresentToday ? "present" : "absent")}>
                                                    <div className={"status-dot " + (isDoctorPresentToday ? "present" : "absent")}></div>
                                                    <span>{isDoctorPresentToday ? "Présent aujourd'hui" : "Absent aujourd'hui"}</span>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </>
                        )}
                        
                        {activeTab === "requests" && isAdmin && (
                            <div className="requests-section">
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1.5rem", flexWrap: "wrap", gap: "1rem" }}>
                                    <h3 className="section-title" style={{ margin: 0 }}>📋 Demandes de congés</h3>
                                    <button className="import-btn primary" style={{ width: "auto" }} onClick={() => setShowRequestModal(true)}>
                                        ➕ Nouvelle demande
                                    </button>
                                </div>
                                
                                <div className="request-filters">
                                    <button className={"filter-btn" + (requestFilter === "all" ? " active" : "")} onClick={() => setRequestFilter("all")}>
                                        Toutes <span className="count">{requests.length}</span>
                                    </button>
                                    <button className={"filter-btn" + (requestFilter === "pending" ? " active" : "")} onClick={() => setRequestFilter("pending")}>
                                        En attente <span className="count">{requests.filter(r => r.status === "pending").length}</span>
                                    </button>
                                    <button className={"filter-btn" + (requestFilter === "validated" ? " active" : "")} onClick={() => setRequestFilter("validated")}>
                                        Validées <span className="count">{requests.filter(r => r.status === "validated").length}</span>
                                    </button>
                                    <button className={"filter-btn" + (requestFilter === "refused" ? " active" : "")} onClick={() => setRequestFilter("refused")}>
                                        Refusées <span className="count">{requests.filter(r => r.status === "refused").length}</span>
                                    </button>
                                </div>
                                
                                {filteredRequests.length === 0 ? (
                                    <div className="no-requests">Aucune demande</div>
                                ) : (
                                    filteredRequests.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).map(request => {
                                        const emp = employees.find(e => e.id === request.employeeId);
                                        return (
                                            <div key={request.id} className={"request-card " + request.status}>
                                                <div className="request-header">
                                                    <div className="request-employee">
                                                        <div className="chip-avatar">{emp ? getInitials(emp.name) : "?"}</div>
                                                        {emp?.name || "Employé inconnu"}
                                                    </div>
                                                    <span className={"request-status " + request.status}>
                                                        {request.status === "pending" ? "⏳ En attente" : request.status === "validated" ? "✅ Validée" : "❌ Refusée"}
                                                    </span>
                                                </div>
                                                <div className="request-details">
                                                    <span><strong>Type :</strong> {ABSENCE_TYPES[request.type]?.label}</span>
                                                    <span><strong>Période :</strong> du {new Date(request.startDate).toLocaleDateString("fr-FR")} au {new Date(request.endDate).toLocaleDateString("fr-FR")}</span>
                                                    <span><strong>Demandé le :</strong> {new Date(request.createdAt).toLocaleDateString("fr-FR")}</span>
                                                </div>
                                                {request.comment && (
                                                    <div className="request-comment">
                                                        <strong>Motif :</strong>
                                                        {request.comment}
                                                    </div>
                                                )}
                                                {request.status === "pending" && (
                                                    <div className="request-actions">
                                                        <button className="btn-validate" onClick={() => setShowResponseModal(request)}>✅ Valider</button>
                                                        <button className="btn-refuse" onClick={() => setShowResponseModal(request)}>❌ Refuser</button>
                                                    </div>
                                                )}
                                                {request.response && (
                                                    <div className="request-response">
                                                        <strong>Réponse direction :</strong>
                                                        <p>{request.response}</p>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })
                                )}
                            </div>
                        )}
                        
                        {activeTab === "admin" && isAdmin && (
                            <div className="admin-section">
                                <h2>⚙️ Administration</h2>
                                <div className="admin-grid">
                                    <div className="admin-card">
                                        <h4>📊 Importer les soldes</h4>
                                        <p>Fichier Excel "Solde des repos"</p>
                                        <input type="file" accept=".xlsx,.xls" onChange={handleSoldesFileImport} className="file-input" id="file-import-soldes" />
                                        <label htmlFor="file-import-soldes" className="import-btn">
                                            {loading ? "⏳ Import..." : "📁 Importer soldes Excel"}
                                        </label>
                                    </div>
                                    <div className="admin-card">
                                        <h4>➕ Saisir une demande</h4>
                                        <p>Créer une demande de congé</p>
                                        <button className="import-btn primary" onClick={() => setShowRequestModal(true)}>📝 Nouvelle demande</button>
                                    </div>
                                    <div className="admin-card">
                                        <h4>🗑️ Réinitialiser congés</h4>
                                        <p>Supprimer les absences</p>
                                        <button className="import-btn danger" onClick={clearData}>🗑️ Supprimer congés</button>
                                    </div>
                                    <div className="admin-card">
                                        <h4>🗑️ Réinitialiser demandes</h4>
                                        <p>Supprimer les demandes</p>
                                        <button className="import-btn danger" onClick={clearRequests}>🗑️ Supprimer demandes</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    
                    <footer className="footer">© 2026 Cabinet d'Orthodontie du Dr François VERGEZ - Saint Paul, La Réunion</footer>
                </div>
            );
        }
        
        ReactDOM.render(<App />, document.getElementById("root"));
    </script>
</body>
</html>
