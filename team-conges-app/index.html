        .import-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(95, 179, 165, 0.3); }

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;
        
        const ADMIN_PASSWORD = "vergez2025";
        
        const EMPLOYEES = [
            { id: 1, name: "François VERGEZ", isDoctor: true, annualLeave: 35 },
            { id: 2, name: "Mathilde TSANG-TUNG", isDoctor: false, annualLeave: 25 },
            { id: 3, name: "Chloé TANGUY", isDoctor: false, annualLeave: 25 },
            { id: 4, name: "Erika CAPDEBOSCQ", isDoctor: false, annualLeave: 25 },
            { id: 5, name: "Virginie BLARD", isDoctor: false, annualLeave: 25 },
            { id: 6, name: "Laurence GIGAN", isDoctor: false, annualLeave: 25 },
            { id: 7, name: "Cécile GRONDIN", isDoctor: false, annualLeave: 25 },
            { id: 8, name: "Fabiola TECHER", isDoctor: false, annualLeave: 25 },
            { id: 9, name: "Sylvie De la Hogue", isDoctor: false, annualLeave: 25 },
            { id: 10, name: "Elodie Ludovic", isDoctor: false, annualLeave: 25 },
            { id: 11, name: "Stéphanie MARTIN", isDoctor: false, annualLeave: 25 },
        ];
        
        const MONTHS = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
        const DAYS = ["Dim", "Lun", "Mar", "Mer", "Jeu", "Ven", "Sam"];
        const ABSENCE_TYPES = { 
            C: { label: "Congé", cls: "conge" }, 
            SS: { label: "Sans solde", cls: "ss" }, 
            M: { label: "Maladie", cls: "maladie" }, 
            F: { label: "Formation", cls: "formation" } 
        };

        function LoginModal({ onLogin, onClose }) {
            const [password, setPassword] = useState("");
            const [error, setError] = useState("");
            
            const handleSubmit = (e) => {
                e.preventDefault();
                if (password === ADMIN_PASSWORD) {
                    onLogin();
                } else {
                    setError("Mot de passe incorrect");
                }
            };
            
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <h2>Accès Administration</h2>
                        <p>Entrez le mot de passe pour accéder à la gestion</p>
                        <form onSubmit={handleSubmit}>
                            {error && <div className="error-msg">{error}</div>}
                            <input 
                                type="password" 
                                placeholder="Mot de passe" 
                                value={password}
                                onChange={(e) => { setPassword(e.target.value); setError(""); }}
                                autoFocus
                            />
                            <div className="modal-buttons">
                                <button type="button" className="btn-cancel" onClick={onClose}>Annuler</button>
                                <button type="submit" className="btn-submit">Connexion</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function getInitials(name) {
            return name.split(" ").map(n => n[0]).join("").slice(0, 2);
        }

        function App() {
            const [absences, setAbsences] = useState({});
            const [selectedMonth, setSelectedMonth] = useState(new Date().getMonth());
            const [loading, setLoading] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [weekStart, setWeekStart] = useState(() => {
                const t = new Date();
                const d = t.getDay();
                const diff = t.getDate() - d + (d === 0 ? -6 : 1);
                return new Date(t.getFullYear(), t.getMonth(), diff);
            });

            const today = new Date();
            const selectedYear = 2025;

            useEffect(() => {
                const saved = localStorage.getItem("vergez_absences_2025");
                if (saved) setAbsences(JSON.parse(saved));
                if (sessionStorage.getItem("vergez_admin") === "true") setIsAdmin(true);
            }, []);

            useEffect(() => {
                if (Object.keys(absences).length > 0) {
                    localStorage.setItem("vergez_absences_2025", JSON.stringify(absences));
                }
            }, [absences]);

            const calculateStats = useCallback((empId) => {
                const empAbs = absences[empId] || {};
                let conges = 0, sansSolde = 0, maladie = 0, formation = 0;
                Object.values(empAbs).forEach(monthData => {
                    Object.values(monthData).forEach(type => {
                        if (type === "C") conges++;
                        else if (type === "SS") sansSolde++;
                        else if (type === "M") maladie++;
                        else if (type === "F") formation++;
                    });
                });
                const emp = EMPLOYEES.find(e => e.id === empId);
                return { conges, sansSolde, maladie, formation, remaining: (emp?.annualLeave || 25) - conges };
            }, [absences]);

            const todayAbsences = useMemo(() => {
                const m = today.getMonth();
                const d = today.getDate();
                return EMPLOYEES.filter(emp => absences[emp.id]?.[m]?.[d])
                    .map(emp => ({ ...emp, type: absences[emp.id][m][d] }));
            }, [absences, today]);

            const isDoctorPresentToday = !absences[1]?.[today.getMonth()]?.[today.getDate()];

            const handleFileImport = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                try {
                    const data = await file.arrayBuffer();
                    const wb = XLSX.read(data, { type: "array" });
                    const newAbs = {};
                    MONTHS.forEach((mn, mi) => {
                        const sh = wb.Sheets[mn];
                        if (!sh) return;
                        const jd = XLSX.utils.sheet_to_json(sh, { header: 1 });
                        for (let r = 8; r < 19; r++) {
                            const rd = jd[r];
                            if (!rd || !rd[1]) continue;
                            const emp = EMPLOYEES.find(x => x.name.toLowerCase() === rd[1].toString().toLowerCase());
                            if (!emp) continue;
                            if (!newAbs[emp.id]) newAbs[emp.id] = {};
                            if (!newAbs[emp.id][mi]) newAbs[emp.id][mi] = {};
                            for (let d = 1; d <= 31; d++) {
                                const cv = rd[d + 1];
                                if (cv && ["C", "SS", "M", "F"].includes(cv)) {
                                    newAbs[emp.id][mi][d] = cv;
                                }
                            }
                        }
                    });
                    setAbsences(newAbs);
                    alert("Import réussi !");
                } catch (err) {
                    console.error(err);
                    alert("Erreur lors de l'import");
                }
                setLoading(false);
                e.target.value = "";
            };

            const clearData = () => {
                if (window.confirm("Supprimer toutes les données ?")) {
                    setAbsences({});
                    localStorage.removeItem("vergez_absences_2025");
                }
            };

            const getWeekDates = () => {
                const dates = [];
                for (let i = 0; i < 7; i++) {
                    const d = new Date(weekStart);
                    d.setDate(d.getDate() + i);
                    dates.push(d);
                }
                return dates;
            };

            const navigateWeek = (dir) => {
                const newStart = new Date(weekStart);
                newStart.setDate(newStart.getDate() + dir * 7);
                setWeekStart(newStart);
            };

            const goToCurrentWeek = () => {
                const t = new Date();
                const d = t.getDay();
                const diff = t.getDate() - d + (d === 0 ? -6 : 1);
                setWeekStart(new Date(t.getFullYear(), t.getMonth(), diff));
            };

            const weekDates = getWeekDates();
            const daysInMonth = new Date(selectedYear, selectedMonth + 1, 0).getDate();
            
            const totalStats = EMPLOYEES.reduce((acc, emp) => {
                const s = calculateStats(emp.id);
                return { conges: acc.conges + s.conges, sansSolde: acc.sansSolde + s.sansSolde, maladie: acc.maladie + s.maladie };
            }, { conges: 0, sansSolde: 0, maladie: 0 });

            return (
                <div className="app-container">
                    {showLoginModal && <LoginModal onLogin={() => { setIsAdmin(true); sessionStorage.setItem("vergez_admin", "true"); setShowLoginModal(false); }} onClose={() => setShowLoginModal(false)} />}
                    
                    <div className="top-bar">
                        <div className="top-bar-left">
                            <span>📍 38 route de Savanna, 97460 Saint Paul - La Réunion</span>
                        </div>
                        <div className="top-bar-right">
                            <span>📞 +262 262 22 55 50</span>
                        </div>
                    </div>
                    
                    <div className="header-main">
                        <h1>Cabinet d'Orthodontie Dr François Vergez</h1>
                        <p>Planning des Congés - Équipe</p>
                    </div>
                    
                    <nav className="nav-bar">
                        <span className="nav-item active">📅 Planning</span>
                        {isAdmin ? (
                            <button className="nav-item admin-btn logged" onClick={() => { setIsAdmin(false); sessionStorage.removeItem("vergez_admin"); }}>
                                🔓 Déconnexion Admin
                            </button>
                        ) : (
                            <button className="nav-item admin-btn" onClick={() => setShowLoginModal(true)}>
                                🔐 Admin
                            </button>
                        )}
                    </nav>
                    
                    <div className="content-wrapper">
                        <div className={"alert-box" + (isDoctorPresentToday ? "" : " info")}>
                            <div className="alert-icon">{isDoctorPresentToday ? "⚠" : "ℹ"}</div>
                            <div className="alert-content">
                                <h3>{isDoctorPresentToday ? "Dr VERGEZ Présent" : "Dr VERGEZ Absent"}</h3>
                                <p>{isDoctorPresentToday ? "Le Dr VERGEZ est présent aujourd'hui. Aucun congé autorisé pour le personnel." : "Le Dr VERGEZ est absent. Les congés sont possibles."}</p>
                            </div>
                        </div>
                        
                        <div className="date-banner">
                            <h2>📆 {today.toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}</h2>
                            <div className="date-info">
                                <div className="date-item">
                                    <div className="label">Absents</div>
                                    <div className="value">{todayAbsences.length}</div>
                                </div>
                                <div className="date-item">
                                    <div className="label">Présents</div>
                                    <div className="value">{EMPLOYEES.length - todayAbsences.length}</div>
                                </div>
                            </div>
                        </div>
                        
                        {isAdmin && (
                            <div className="admin-section">
                                <h2>⚙️ Administration</h2>
                                <div className="admin-grid">
                                    <div className="admin-card">
                                        <h4>📤 Importer les données</h4>
                                        <p>Importez le fichier Excel du calendrier des absences</p>
                                        <input type="file" accept=".xlsx,.xls" onChange={handleFileImport} className="file-input" id="file-import" />
                                        <label htmlFor="file-import" className="import-btn">
                                            {loading ? "⏳ Import..." : "📁 Sélectionner fichier Excel"}
                                        </label>
                                    </div>
                                    <div className="admin-card">
                                        <h4>🗑️ Réinitialiser</h4>
                                        <p>Supprimer toutes les données de congés</p>
                                        <button className="import-btn danger" onClick={clearData}>🗑️ Supprimer les données</button>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        <div className="today-absences">
                            <h3 className="section-title">👤 Qui est absent aujourd'hui ?</h3>
                            {todayAbsences.length > 0 ? (
                                <div className="absent-list">
                                    {todayAbsences.map(emp => (
                                        <div key={emp.id} className={"absent-chip " + ABSENCE_TYPES[emp.type]?.cls}>
                                            <div className="chip-avatar">{getInitials(emp.name)}</div>
                                            <span>{emp.name}</span>
                                            <span className={"chip-type " + ABSENCE_TYPES[emp.type]?.cls}>{ABSENCE_TYPES[emp.type]?.label}</span>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="no-absences">✅ Toute l'équipe est présente aujourd'hui !</div>
                            )}
                        </div>
                        
                        <div className="main-layout">
                            <div className="main-section">
                                <div className="calendar-week">
                                    <div className="calendar-week-header">
                                        <span>Semaine du {weekStart.toLocaleDateString("fr-FR", { day: "numeric", month: "long" })}</span>
                                        <div className="week-nav">
                                            <button onClick={() => navigateWeek(-1)}>◀</button>
                                            <button onClick={goToCurrentWeek}>Auj.</button>
                                            <button onClick={() => navigateWeek(1)}>▶</button>
                                        </div>
                                    </div>
                                    <div className="calendar-week-grid">
                                        <div className="calendar-week-days">
                                            <div>Employé</div>
                                            {weekDates.map((date, i) => (
                                                <div key={i} className="day-header">
                                                    <span className="day-name">{DAYS[date.getDay()]}</span>
                                                    <span className={"day-num" + (date.toDateString() === today.toDateString() ? " today" : "")}>{date.getDate()}</span>
                                                </div>
                                            ))}
                                        </div>
                                        {EMPLOYEES.map(emp => (
                                            <div key={emp.id} className="calendar-week-row">
                                                <div>
                                                    <div className={"mini-avatar" + (emp.isDoctor ? " doctor" : "")}>{getInitials(emp.name)}</div>
                                                    <span>{emp.name.split(" ")[0]}</span>
                                                </div>
                                                {weekDates.map((date, i) => {
                                                    const m = date.getMonth();
                                                    const d = date.getDate();
                                                    const isWe = date.getDay() === 0 || date.getDay() === 6;
                                                    const at = absences[emp.id]?.[m]?.[d];
                                                    const cls = at ? ABSENCE_TYPES[at]?.cls : (isWe ? "weekend" : "");
                                                    return (
                                                        <div key={i}>
                                                            <div className={"week-cell " + cls}>{at || ""}</div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                
                                <h3 className="section-title" style={{ marginTop: "1rem" }}>
                                    📅 Vue mensuelle <span className="section-badge">{selectedYear}</span>
                                </h3>
                                <div className="month-tabs">
                                    {MONTHS.map((m, i) => (
                                        <button key={m} className={"month-tab" + (selectedMonth === i ? " active" : "")} onClick={() => setSelectedMonth(i)}>
                                            {m.slice(0, 3)}
                                        </button>
                                    ))}
                                </div>
                                
                                <div className="calendar-full">
                                    <div className="calendar-full-header">
                                        <div>Employé</div>
                                        {Array.from({ length: daysInMonth }, (_, i) => {
                                            const d = new Date(selectedYear, selectedMonth, i + 1);
                                            return <div key={i + 1}>{i + 1}<br /><small>{DAYS[d.getDay()].slice(0, 1)}</small></div>;
                                        })}
                                    </div>
                                    {EMPLOYEES.map(emp => (
                                        <div key={emp.id} className="calendar-full-row">
                                            <div>
                                                <div className={"mini-avatar" + (emp.isDoctor ? " doctor" : "")} style={{ width: 20, height: 20, fontSize: "0.55rem" }}>{getInitials(emp.name)}</div>
                                                <span>{emp.name.split(" ")[0]}</span>
                                            </div>
                                            {Array.from({ length: daysInMonth }, (_, i) => {
                                                const day = i + 1;
                                                const date = new Date(selectedYear, selectedMonth, day);
                                                const isWe = date.getDay() === 0 || date.getDay() === 6;
                                                const at = absences[emp.id]?.[selectedMonth]?.[day];
                                                const cls = at ? ABSENCE_TYPES[at]?.cls : (isWe ? "weekend" : "");
                                                return <div key={day} className={"full-cell " + cls}>{at || ""}</div>;
                                            })}
                                        </div>
                                    ))}
                                </div>
                                
                                <h3 className="section-title" style={{ marginTop: "1.5rem" }}>📊 Soldes des Congés</h3>
                                <div className="employees-table">
                                    <div className="table-header">
                                        <div>Employé</div>
                                        <div>Congés</div>
                                        <div>SS</div>
                                        <div>Maladie</div>
                                        <div>Formation</div>
                                        <div>Solde</div>
                                    </div>
                                    {EMPLOYEES.map(emp => {
                                        const s = calculateStats(emp.id);
                                        return (
                                            <div key={emp.id} className="table-row">
                                                <div className="employee-name">
                                                    <div className={"employee-avatar" + (emp.isDoctor ? " doctor" : "")}>{getInitials(emp.name)}</div>
                                                    <span>{emp.name}</span>
                                                </div>
                                                <div className="cell-value">{s.conges}</div>
                                                <div className="cell-value neutral">{s.sansSolde}</div>
                                                <div className="cell-value negative">{s.maladie}</div>
                                                <div className="cell-value">{s.formation}</div>
                                                <div className={"cell-value " + (s.remaining > 10 ? "positive" : s.remaining > 0 ? "warning" : "negative")}>{s.remaining}</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                            
                            <div className="sidebar">
                                <div className="sidebar-card">
                                    <h3>📊 Statistiques {selectedYear}</h3>
                                    <div style={{ display: "grid", gap: "0.75rem" }}>
                                        <div style={{ display: "flex", justifyContent: "space-between" }}>
                                            <span>Total congés</span>
                                            <strong style={{ color: "var(--primary)" }}>{totalStats.conges}</strong>
                                        </div>
                                        <div style={{ display: "flex", justifyContent: "space-between" }}>
                                            <span>Sans solde</span>
                                            <strong style={{ color: "var(--warning)" }}>{totalStats.sansSolde}</strong>
                                        </div>
                                        <div style={{ display: "flex", justifyContent: "space-between" }}>
                                            <span>Maladie</span>
                                            <strong style={{ color: "var(--danger)" }}>{totalStats.maladie}</strong>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="sidebar-card">
                                    <h3>🎨 Légende</h3>
                                    <div className="legend-grid">
                                        <div className="legend-item"><div className="legend-color conge"></div><span>C - Congé</span></div>
                                        <div className="legend-item"><div className="legend-color ss"></div><span>SS - Sans solde</span></div>
                                        <div className="legend-item"><div className="legend-color maladie"></div><span>M - Maladie</span></div>
                                        <div className="legend-item"><div className="legend-color formation"></div><span>F - Formation</span></div>
                                    </div>
                                </div>
                                
                                <div className="sidebar-card">
                                    <h3>📋 Règles</h3>
                                    <ul className="rules-list">
                                        <li><div className="rule-icon danger">!</div><span>Max <strong>3 semaines</strong> consécutives/an</span></li>
                                        <li><div className="rule-icon warning">⚠</div><span>Pas de congé si <strong>Dr VERGEZ présent</strong></span></li>
                                        <li><div className="rule-icon info">i</div><span>Solde: <strong>25j</strong> (35j docteur)</span></li>
                                    </ul>
                                </div>
                                
                                <div className="sidebar-card">
                                    <h3>👨‍⚕️ Dr VERGEZ</h3>
                                    <div className={"doctor-status " + (isDoctorPresentToday ? "present" : "absent")}>
                                        <div className={"status-dot " + (isDoctorPresentToday ? "present" : "absent")}></div>
                                        <span>{isDoctorPresentToday ? "Présent aujourd'hui" : "Absent aujourd'hui"}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <footer className="footer">
                        © 2025 Cabinet d'Orthodontie du Dr François VERGEZ - Saint Paul, La Réunion
                    </footer>
                </div>
            );
        }
        
        ReactDOM.render(<App />, document.getElementById("root"));
    </script>
</body>
</html>
